<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Větev na větvi — Zpětná vazba</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700;900&family=Inter:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--paper:#F4EFE1;--forest:#2F5D46;--forest-deep:#213F30;--sage:#5E8570;--terra:#BF6A3F;--terra-deep:#9E5230;--ink:#26211A;--ink-soft:#5A5140;--rule:#DED5BE;}
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:var(--paper);color:var(--ink);font-family:Inter,system-ui,sans-serif;padding:2rem;text-align:center;
    background-image:radial-gradient(circle at 85% 8%,rgba(94,133,112,0.05),transparent 42%),radial-gradient(circle at 6% 94%,rgba(191,106,63,0.045),transparent 40%);}
  .mark{margin-bottom:1.6rem;}
  .eyebrow{font-family:"Fira Code",monospace;font-size:.74rem;letter-spacing:.18em;text-transform:uppercase;color:var(--terra-deep);margin-bottom:1rem;
    display:inline-flex;align-items:center;gap:.55rem;}
  .eyebrow::before{content:"";width:22px;height:2px;background:var(--terra);display:inline-block;}
  h1{font-family:Merriweather,Georgia,serif;font-weight:900;font-size:clamp(2rem,6vw,3rem);line-height:1.08;letter-spacing:-.01em;margin:0 0 1.1rem;color:var(--ink);}
  p.note{max-width:34rem;color:var(--ink-soft);font-size:1.06rem;line-height:1.62;margin:0 0 2.1rem;}
  .back{font-family:"Fira Code",monospace;font-size:.85rem;color:var(--forest);border:1px solid var(--rule);border-radius:999px;
    padding:.55rem 1.05rem;transition:.18s ease;display:inline-flex;align-items:center;gap:.5rem;text-decoration:none;}
  .back:hover{background:#FBF8EF;border-color:var(--terra);color:var(--terra-deep);}
  .foot{margin-top:2.8rem;display:inline-flex;align-items:center;gap:.5rem;font-family:"Fira Code",monospace;font-size:.72rem;color:var(--sage);letter-spacing:.03em;}
  a{color:inherit;}
  :focus-visible{outline:2.5px solid var(--terra);outline-offset:3px;border-radius:4px;}
</style>
</head>
<body>
  <div class="mark"><svg width="34" height="34" viewBox="0 0 32 32" aria-hidden="true"><g fill="none" stroke="#2F5D46" stroke-width="1.9" stroke-linecap="round"><path d="M16 30 L16 16"/><path d="M16 21 C16 21 10 19 8 13"/><path d="M16 18 C16 18 22 17 24 11"/><path d="M16 16 C16 16 16 9 20 6"/></g><circle cx="8" cy="13" r="2.5" fill="#2F5D46"/><circle cx="24" cy="11" r="2.5" fill="#5E8570"/><circle cx="20" cy="6" r="2.7" fill="#BF6A3F"/><circle cx="16" cy="30" r="1.7" fill="#5E8570"/></svg></div>
  <div class="eyebrow">rozcestník / zpětná vazba</div>
  <h1>Zpětná vazba</h1>
  <p class="note">Místo pro tvou zpětnou vazbu se teprve chystá. Zatím platí staré dobré: což takhle napsat rovnou? Vrať se na rozcestník.</p>

  <div class="foot"><svg width="16" height="16" viewBox="0 0 32 32" aria-hidden="true"><g fill="none" stroke="#5E8570" stroke-width="2.4" stroke-linecap="round"><path d="M16 30 L16 16"/><path d="M16 21 C16 21 10 19 8 13"/><path d="M16 18 C16 18 22 17 24 11"/></g><circle cx="8" cy="13" r="3" fill="#2F5D46"/><circle cx="24" cy="11" r="3" fill="#5E8570"/><circle cx="16" cy="16" r="3.2" fill="#BF6A3F"/></svg> Větev na větvi</div>
</body>
</html>
